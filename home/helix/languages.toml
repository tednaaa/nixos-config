# Mirrors the per-language setup from home/zed/settings.json.
# Zed defaults: hard_tabs = true, tab_size = 2 (Python overrides to 4 spaces).

# ---------- Nix ----------
# zed: language_servers = ["nixd", "!nil"]
[language-server.nixd]
command = "nixd"

[[language]]
name = "nix"
language-servers = ["nixd"]
auto-format = true
indent = { tab-width = 2, unit = "\t" }

# ---------- TypeScript / TSX / Vue ----------
# zed: formatter = [] (no prettier) + eslint source.fixAll on save.
# Helix has no per-action "code actions on format", so we just disable
# LSP formatting (auto-format = false) to match "formatter: []".
# eslint runs as an LSP for diagnostics; trigger fixes manually with `<space>a`.
[language-server.eslint]
command = "vscode-eslint-language-server"
args = ["--stdio"]

[[language]]
name = "typescript"
language-servers = ["typescript-language-server", "eslint"]
auto-format = false
indent = { tab-width = 2, unit = "\t" }

[[language]]
name = "tsx"
language-servers = ["typescript-language-server", "eslint"]
auto-format = false
indent = { tab-width = 2, unit = "\t" }

[[language]]
name = "jsx"
language-servers = ["typescript-language-server", "eslint"]
auto-format = false
indent = { tab-width = 2, unit = "\t" }

[[language]]
name = "vue"
language-servers = ["vuels", "eslint"]
auto-format = false
indent = { tab-width = 2, unit = "\t" }

# ---------- Python ----------
# zed: hard_tabs = false, tab_size = 4, black via .venv/bin/black,
#      basedpyright typeCheckingMode = "off".
[language-server.basedpyright]
command = "basedpyright-langserver"
args = ["--stdio"]

[language-server.basedpyright.config.basedpyright.analysis]
typeCheckingMode = "off"

[[language]]
name = "python"
language-servers = ["basedpyright"]
auto-format = true
indent = { tab-width = 4, unit = "    " }
# Use ".venv/bin/black" instead if you want the project-local black like Zed.
formatter = { command = "black", args = ["-", "-q"] }

# ---------- Rust ----------
# zed: rust-analyzer check.command = "clippy"
[language-server.rust-analyzer.config.check]
command = "clippy"

# ---------- YAML ----------
# zed: yaml-language-server schemaStore + kubernetes schema for clusters/*.yml
[language-server.yaml-language-server.config.yaml]
completion = true

[language-server.yaml-language-server.config.yaml.schemaStore]
enable = true

[language-server.yaml-language-server.config.yaml.schemas]
kubernetes = "**/clusters/*.yml"
