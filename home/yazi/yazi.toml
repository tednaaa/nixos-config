[mgr]
show_hidden = false

[opener]
tabiew = [
	{ run = 'tw "$@"', block = true, desc = "tabiew" },
]

[open]
prepend_rules = [
	{ url = "*.csv", use = "tabiew" },
	{ url = "*.xlsx", use = "tabiew" },
	{ url = "*.xls", use = "tabiew" },
	{ mime = "text/csv", use = "tabiew" },
	{ mime = "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet", use = "tabiew" },
]
